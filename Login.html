<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f0f2f5;
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h2 {
      font-size: 1.6rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
      color: #1a1a1a;
    }

    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 0.95rem;
      color: #333;
      outline: none;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #4f8ef7; }
    input::placeholder { color: #aaa; }

    .btn {
      width: 100%;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .btn:hover { background: #3a7de8; }

    .bottom {
      text-align: center;
      margin-top: 18px;
      font-size: 0.88rem;
      color: #666;
    }

    .bottom a {
      color: #4f8ef7;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Login</h2>
    <input type="email" placeholder="Email"/>
    <input type="password" placeholder="Password"/>
    <button class="btn">Login</button>
    <div class="bottom">
      Don't have an account? <a href="register.html">Register</a>
    </div>
  </div>

</body>
</html>
